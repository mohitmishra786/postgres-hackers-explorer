name: Daily Crawler

on:
  schedule:
    # Run daily at 03:00 UTC (low traffic time)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Crawler command to run"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - embed
          - summarize
          - status
      from_period:
        description: "Start from period YYYY/MM (optional, used with embed)"
        required: false
        default: ""
      embedding_provider:
        description: "Embedding provider"
        required: false
        default: "fastembed"
        type: choice
        options:
          - fastembed
          - openai

env:
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  crawl-and-ingest:
    name: Crawl + Embed pgsql-hackers
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install Python dependencies
        working-directory: crawler
        run: pip install -r requirements.txt

      - name: Restore crawl output cache
        uses: actions/cache@v4
        with:
          path: crawler/output
          key: crawler-output-${{ github.run_id }}
          restore-keys: |
            crawler-output-

      - name: Compute current month period
        id: period
        run: |
          # Current month in YYYY/MM format — used for incremental crawl & embed
          CURRENT_MONTH=$(date -u +%Y/%m)
          echo "current_month=$CURRENT_MONTH" >> "$GITHUB_OUTPUT"
          echo "Current month: $CURRENT_MONTH"

      - name: Run crawler command
        working-directory: crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMBEDDING_PROVIDER: fastembed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMAND="${{ github.event.inputs.command }}"
          else
            COMMAND="incremental"
          fi

          echo "Running command: $COMMAND"

          case "$COMMAND" in
            incremental)
              # Only crawl the current month — previously crawled months are already in Neon.
              # The scraper is idempotent (upsert), so re-running the current month is safe.
              MONTH="${{ steps.period.outputs.current_month }}"
              echo "Scraping current month only: $MONTH"
              python main.py scrape --only "$MONTH"
              ;;
            embed)
              FROM="${{ github.event.inputs.from_period }}"
              PROVIDER="${{ github.event.inputs.embedding_provider }}"
              if [ -n "$FROM" ]; then
                python main.py embed --provider "$PROVIDER" --from "$FROM"
              else
                python main.py embed --provider "$PROVIDER"
              fi
              ;;
            summarize)
              python main.py summarize
              ;;
            status)
              python main.py status
              ;;
            *)
              echo "Unknown command: $COMMAND"
              exit 1
              ;;
          esac

      - name: Embed current month emails
        if: github.event_name == 'schedule' || github.event.inputs.command == 'incremental'
        working-directory: crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMBEDDING_PROVIDER: fastembed
        run: |
          MONTH="${{ steps.period.outputs.current_month }}"
          echo "Embedding emails from current month: $MONTH"
          python main.py embed --from "$MONTH"

      - name: Print status
        if: always()
        working-directory: crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py status

      - name: Save crawl output cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: crawler/output
          key: crawler-output-${{ github.run_id }}
