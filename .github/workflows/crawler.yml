name: Daily Crawler

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental   # marc-scrape current month + embed (default daily job)
          - embed         # re-embed only (no scrape)
          - status        # print DB stats
      from_period:
        description: "Start period YYYY/MM (optional, only used with embed command)"
        required: false
        default: ""
      embedding_provider:
        description: "Embedding backend"
        required: false
        default: "fastembed"
        type: choice
        options:
          - fastembed
          - openai

env:
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  crawl-and-ingest:
    name: "Daily MARC crawl + embed"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      - name: Install Python dependencies
        working-directory: crawler
        run: pip install -r requirements.txt

      # ── 3. Fastembed model cache ───────────────────────────────────────
      - name: Restore fastembed model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: fastembed-bge-small-en-v1.5

      # ── 4. Current month ───────────────────────────────────────────────
      - name: Compute current month
        id: period
        run: |
          CURRENT_MONTH=$(date -u +%Y/%m)
          echo "current_month=$CURRENT_MONTH" >> "$GITHUB_OUTPUT"
          echo "Current month: $CURRENT_MONTH"

      # ── 5. Scrape (incremental only) ───────────────────────────────────
      - name: Scrape current month from MARC.info
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.command == 'incremental'
        working-directory: crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
        run: |
          MONTH="${{ steps.period.outputs.current_month }}"
          echo "marc-scrape --only $MONTH"
          python main.py marc-scrape --only "$MONTH"

      # ── 6. Embed + ingest ──────────────────────────────────────────────
      - name: Embed and ingest into Neon
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.command == 'incremental' ||
          github.event.inputs.command == 'embed'
        working-directory: crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
        run: |
          # For incremental (schedule or manual): embed current month
          # For embed command: use from_period if provided, else current month
          if [ "${{ github.event.inputs.command }}" = "embed" ] && \
             [ -n "${{ github.event.inputs.from_period }}" ]; then
            FROM="${{ github.event.inputs.from_period }}"
          else
            FROM="${{ steps.period.outputs.current_month }}"
          fi

          PROVIDER="${{ github.event.inputs.embedding_provider }}"
          PROVIDER="${PROVIDER:-fastembed}"

          echo "embed --provider $PROVIDER --from $FROM"
          python main.py embed --provider "$PROVIDER" --from "$FROM"

      # ── 7. Status ──────────────────────────────────────────────────────
      - name: Print DB status
        if: always()
        working-directory: crawler
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
        run: python main.py status
